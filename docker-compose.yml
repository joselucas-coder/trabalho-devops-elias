services:
  frontend:
    build: ./frontend
    container_name: startup-frontend
    ports:
      - "5173:5173"
    # FALHA 1: Faltam variáveis de ambiente para o frontend acessar a API no Docker

  backend:
    build: ./backend
    container_name: startup-backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
    # FALHA 4: Falta o depends_on e healthcheck. O backend vai subir antes do banco estar pronto.

  db:
    image: postgres:15
    container_name: startup-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=senha_correta
      - POSTGRES_DB=startup_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata:
