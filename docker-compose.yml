version: '3.8'

services:
  frontend:
    build: ./frontend
    container_name: startup-frontend
    ports:
      - "5173:5173"
    # FALHA 1: Faltam variáveis de ambiente para o frontend acessar a API no Docker

  backend:
    build: ./backend
    container_name: startup-backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
    # FALHA 4: Falta o depends_on e healthcheck. O backend vai subir antes do banco estar pronto.

  db:
    image: postgres:15
    container_name: startup-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    # FALHA 5: Persistência de dados comentada. Vai perder dados se reiniciar.
    # volumes:
    #   - pgdata:/var/lib/postgresql/data
    # FALHA 6: O init.sql não está sendo chamado para criar a tabela.

# volumes:
#   pgdata: