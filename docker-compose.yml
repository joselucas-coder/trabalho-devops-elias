services:
  frontend:
    build: ./frontend
    container_name: startup-frontend
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:3000

  backend:
    build: ./backend
    container_name: startup-backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=senha_correta
      - DB_NAME=startup_db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    container_name: startup-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=senha_correta
      - POSTGRES_DB=startup_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d startup_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata:
